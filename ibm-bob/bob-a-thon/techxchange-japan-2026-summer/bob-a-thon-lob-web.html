    <script>
        const md = "# IBM TechXchange Summit Japan 2026\u5411\u3051Bob-a-thon\u30cf\u30f3\u30ba\u30aa\u30f3\u30fb\u30ac\u30a4\u30c9\n## \u4ed5\u69d8\u99c6\u52d5\u958b\u767a\u5165\u9580\uff1a\u30e6\u30fc\u30b9\u30b1\u30fc\u30b9\u3092\u60f3\u5b9a\u3057\u305f\u3001Web\u30a2\u30d7\u30ea\u306e\u30d7\u30ed\u30c8\u30bf\u30a4\u30d4\u30f3\u30b0\n\n* \u6700\u7d42\u66f4\u65b0\u65e5: 2026/7/16\n* Author: Akira Onishi (Principal BDE, AI Lab Japan Office, IBM Japan)\n\n---\n\n## \ud83d\udccb \u30ef\u30fc\u30af\u30b7\u30e7\u30c3\u30d7\u6982\u8981\n\n### \u76ee\u7684\n\n- **IBM Bob\u3092\u4f7f\u3063\u305f\u30e2\u30c3\u30af\u30a2\u30c3\u30d7\u958b\u767a\u3092\u4f53\u9a13\u3059\u308b**: \u77ed\u6642\u9593\u3067\u3069\u3053\u307e\u3067\u4f5c\u308c\u308b\u304b\u3001\u305d\u306e\u901f\u3055\u3092\u5b9f\u611f\u3059\u308b\n- **\u300c\u3056\u3063\u304f\u308a\u4f9d\u983c\u300d\u3068\u300c\u4ed5\u69d8\u3092\u6c7a\u3081\u3066\u304b\u3089\u4f9d\u983c\u300d\u306e\u9055\u3044\u3092\u77e5\u308b**: \u540c\u3058\u30c4\u30fc\u30eb\u3067\u3082\u3001\u6e21\u3057\u65b9\u3067\u51fa\u6765\u4e0a\u304c\u308a\u304c\u5909\u308f\u308b\u3053\u3068\u3092\u78ba\u304b\u3081\u308b\n- **\u8981\u4ef6 \u2192 \u30e2\u30c3\u30af\u30a2\u30c3\u30d7 \u2192 \u6587\u66f8\u5316\u306e\u6d41\u308c\u3092\u3072\u3068\u901a\u308a\u3084\u3063\u3066\u307f\u308b**: \u4f5c\u3063\u3066\u7d42\u308f\u308a\u3067\u306f\u306a\u304f\u3001\u8981\u4ef6\u5b9a\u7fa9\u3084\u8a2d\u8a08\u66f8\u3082\u4e00\u7dd2\u306b\u6574\u3048\u308b\n\n### \u5bfe\u8c61\u8005\n\n\u4e8b\u696d\u62c5\u5f53\u8005\uff08LOB\uff09\u3001IT\u30a8\u30f3\u30b8\u30cb\u30a2\u3001\u30b3\u30f3\u30b5\u30eb\u30bf\u30f3\u30c8\u306a\u3069\u3001\u3069\u306a\u305f\u3067\u3082\u53c2\u52a0\u3067\u304d\u308b\u3002\nIT\u306e\u77e5\u8b58\u306f\u554f\u308f\u306a\u3044\u3002IBM Bob\u304c\u30d1\u30fc\u30c8\u30ca\u30fc\u3068\u3057\u3066\u30b5\u30dd\u30fc\u30c8\u3059\u308b\u3002\n\n### \u6240\u8981\u6642\u9593\n\n\u7d041\u6642\u959330\u5206\n\n### \u524d\u63d0\u6761\u4ef6\n\n- IBM Bob\u304c\u4f7f\u3048\u308b\u74b0\u5883\u304c\u6e96\u5099\u3055\u308c\u3066\u3044\u308b\u3053\u3068\n- Web\u30d6\u30e9\u30a6\u30b6\u30fc\uff08Chrome\u3001Edge\u3001Firefox\u306a\u3069\uff09\u304c\u4f7f\u3048\u308b\u3053\u3068\n- [ZIP\u30d5\u30a1\u30a4\u30eb](https://github.com/ayatokura/japan-technology/raw/refs/heads/main/ibm-bob/bob-a-thon/techxchange-japan-2026-summer/lab-files.zip)\u3092\u30c0\u30a6\u30f3\u30ed\u30fc\u30c9\u3057\u3066\u3001\u30ed\u30fc\u30ab\u30eb\u30fb\u30b3\u30f3\u30d4\u30e5\u30fc\u30bf\u30fc\u5185\u306b\u5c55\u958b\u6e08\u307f\u3067\u3042\u308b\u3053\u3068\n\n---\n\n## \ud83d\uddc2\ufe0f \u30ef\u30fc\u30af\u30b7\u30e7\u30c3\u30d7\u306e\u5168\u4f53\u69cb\u6210\n\n| \u30d1\u30fc\u30c8 | \u5185\u5bb9 | \u6240\u8981\u6642\u9593\uff08\u76ee\u5b89\uff09 |\n|---|---|---|\n| \u30aa\u30fc\u30d7\u30cb\u30f3\u30b0 | \u958b\u4f1a\u30fb\u6328\u62f6 | 5\u5206 |\n| IBM Bob\u6982\u8981\u8aac\u660e | IBM Bob\u3068\u306f\u4f55\u304b\u3001\u3067\u304d\u308b\u3053\u3068\u306e\u7d39\u4ecb | 5\u5206 |\n| Bob-a-thon\u30cf\u30f3\u30ba\u30aa\u30f3\u30fb\u30ac\u30a4\u30c9\u8aac\u660e | \u30ef\u30fc\u30af\u30b7\u30e7\u30c3\u30d7\u306e\u76ee\u7684\u30fb\u6d41\u308c\u30fb\u9032\u3081\u65b9\u306e\u8aac\u660e | 12\u5206 |\n| \u74b0\u5883\u78ba\u8a8d | IBM Bob\u63a5\u7d9a\u78ba\u8a8d\u30fb\u30d5\u30a9\u30eb\u30c0\u30fc\u6e96\u5099 | 5\u5206 |\n| **\u524d\u534a: \u7df4\u7fd2\u30e9\u30dc\uff08\u5168\u54e1\u5171\u901a\uff09** | | |\n| Lab 1 | IBM Bob\u306b\u3056\u3063\u304f\u308a\u4f9d\u983c\u3057\u3066\u307f\u308b | 5\u5206 |\n| Lab 2 | \u8981\u4ef6\u30c6\u30f3\u30d7\u30ec\u30fc\u30c8\u3092\u4f5c\u308b | 5\u5206 |\n| Lab 3 | \u8ab2\u984c\u3092\u8aad\u307f\u89e3\u3044\u3066\u3001\u8981\u4ef6\u3092\u307e\u3068\u3081\u308b | 10\u5206 |\n| Lab 4 | \u8981\u4ef6\u304b\u3089\u30e2\u30c3\u30af\u30a2\u30c3\u30d7\u3092\u4f5c\u308b | 10\u5206 |\n| Lab 5 | \u8ffd\u52a0\u306e\u8981\u671b\u3067\u30e2\u30c3\u30af\u30a2\u30c3\u30d7\u3092\u78e8\u304f | 4\u5206 |\n| Lab 6 | \u8a2d\u8a08\u66f8\u3068\u4f7f\u3044\u65b9\u8aac\u660e\u66f8\u3092\u4f5c\u308b | 3\u5206 |\n| \u307e\u3068\u3081 | \u6210\u679c\u7269\u306e\u78ba\u8a8d\u3068\u632f\u308a\u8fd4\u308a | 1\u5206 |\n| **\u5f8c\u534a: \u5404\u30b0\u30eb\u30fc\u30d7\u3067\u4f5c\u696d** | | |\n| \u4f01\u696d\u8a2d\u5b9a\u30fb\u5f79\u5272\u5225\u8ab2\u984c | \u4f01\u696d\u8a2d\u5b9a\u30e1\u30e2\u8a18\u5165 \u2192 \u5f79\u5272\u5225\u306b\u30e2\u30c3\u30af\u30a2\u30c3\u30d7\u3092\u4f5c\u6210 | 20\u5206 |\n| \u30af\u30ed\u30fc\u30b8\u30f3\u30b0 | \u6210\u679c\u7269\u306e\u5171\u6709\u30fb\u30b0\u30eb\u30fc\u30d7\u5185\u767a\u8868\u30fb\u307e\u3068\u3081 | 5\u5206 |\n| \u30aa\u30d7\u30b7\u30e7\u30f3 | \u8a08\u753b\u99c6\u52d5\u306e\u958b\u767a | \u2014 |\n\n---\n\n## \ud83e\uddea \u7df4\u7fd2\u30e9\u30dc\uff08\u5168\u54e1\u5171\u901a\uff09\n\n\u5168\u54e1\u3067\u540c\u3058\u300c\u55b6\u696d\u30c1\u30fc\u30e0\u306eCRM\u300d\u3092\u984c\u6750\u306b\u3001IBM Bob\u3092\u4f7f\u3063\u305f\u4ed5\u69d8\u99c6\u52d5\u306e\u958b\u767a\u30d7\u30ed\u30bb\u30b9\u3092\u7df4\u7fd2\u3059\u308b\u3002\n\n> \ud83d\udca1 **CRM\uff08\u9867\u5ba2\u95a2\u4fc2\u7ba1\u7406\uff09\u3068\u306f**: Customer Relationship Management \u306e\u7565\u3002\u9867\u5ba2\u306e\u57fa\u672c\u60c5\u5831\u30fb\u5546\u8ac7\u5c65\u6b74\u30fb\u5bfe\u5fdc\u8a18\u9332\u306a\u3069\u3092\u4e00\u5143\u7ba1\u7406\u3059\u308b\u30b7\u30b9\u30c6\u30e0\u306e\u3053\u3068\u3002\u55b6\u696d\u62c5\u5f53\u8005\u304c\u65e5\u3005\u306e\u9867\u5ba2\u5bfe\u5fdc\u3092\u52b9\u7387\u5316\u3059\u308b\u305f\u3081\u306b\u4f7f\u3046\u3002\u3053\u306e\u30cf\u30f3\u30ba\u30aa\u30f3\u3067\u306f\u3001\u30b7\u30f3\u30d7\u30eb\u306aWeb\u30a2\u30d7\u30ea\u3068\u3057\u3066\u30d6\u30e9\u30a6\u30b6\u30fc\u3067\u52d5\u304fCRM\u306e\u30e2\u30c3\u30af\u30a2\u30c3\u30d7\u3092\u4f5c\u308b\u3002\n\n> \ud83d\udca1 \u5404Lab\u306e\u6240\u8981\u6642\u9593\u306b\u306fBob\u306e\u5fdc\u7b54\u5f85\u3061\u6642\u9593\u3092\u542b\u307f\u307e\u3059\u3002\u5fdc\u7b54\u6642\u9593\u306f\u74b0\u5883\u306b\u3088\u3063\u3066\u7570\u306a\u308a\u307e\u3059\u3002\n\n---\n\n### Lab 1: IBM Bob\u306b\u3056\u3063\u304f\u308a\u4f9d\u983c\u3057\u3066\u307f\u308b\uff085\u5206\uff09\n\n**\u3053\u306eLab\u3067\u3084\u308b\u3053\u3068**: \u5177\u4f53\u7684\u306a\u6307\u793a\u3092\u51fa\u3055\u305a\u306bBob\u306b\u983c\u3080\u3068\u3001\u3069\u3093\u306a\u3082\u306e\u304c\u51fa\u3066\u304f\u308b\u304b\u8a66\u3059\u3002\n\n#### \u624b\u9806\n\n**1-1. IBM Bob\u3092\u8d77\u52d5\u3059\u308b**\n\nIBM Bob\u3092\u958b\u304f\u3002\u307e\u3060\u8d77\u52d5\u3057\u3066\u3044\u306a\u3044\u5834\u5408\u306f\u3001\u30a2\u30d7\u30ea\u30b1\u30fc\u30b7\u30e7\u30f3\u4e00\u89a7\u304b\u3089IBM Bob\u3092\u8d77\u52d5\u3059\u308b\u3002\n\n**1-2. \u914d\u5e03\u30d5\u30a9\u30eb\u30c0\u30fc\u3092\u958b\u304f**\n\n1. IBM Bob\u306e\u30e1\u30cb\u30e5\u30fc\u304b\u3089 **\u300c\u30d5\u30a1\u30a4\u30eb\u300d\u2192\u300c\u30d5\u30a9\u30eb\u30c0\u30fc\u3092\u958b\u304f\u300d** \u3092\u9078\u3076\n2. ZIP\u3092\u5c55\u958b\u3057\u305f\u30d5\u30a9\u30eb\u30c0\u30fc\u3092\u305d\u306e\u307e\u307e\u9078\u3093\u3067 **\u300c\u958b\u304f\u300d** \u3092\u30af\u30ea\u30c3\u30af\u3059\u308b\n\n> \ud83d\udca1 IBM Bob\u306f\u30d5\u30a9\u30eb\u30c0\u30fc\u5358\u4f4d\u3067\u4f5c\u696d\u3057\u307e\u3059\u3002Bob\u304c\u4f5c\u308b\u30d5\u30a1\u30a4\u30eb\u306f\u3001\u958b\u3044\u305f\u30d5\u30a9\u30eb\u30c0\u30fc\u306e\u4e2d\u306b\u5165\u308a\u307e\u3059\u3002\u3059\u3079\u3066\u306eLab\u3092\u3053\u306e\u30d5\u30a9\u30eb\u30c0\u30fc\u3067\u4f5c\u696d\u3057\u307e\u3059\u3002\n\n**1-3. Bob\u306b\u3056\u3063\u304f\u308a\u983c\u3093\u3067\u307f\u308b**\n\nIBM Bob\u306e\u30c1\u30e3\u30c3\u30c8\u6b04\u306b\u3001\u4ee5\u4e0b\u306e\u30e1\u30c3\u30bb\u30fc\u30b8\u3092\u5165\u529b\u3057\u3066\u9001\u4fe1\u3059\u308b\u3002\n\n```\n\u9867\u5ba2\u95a2\u4fc2\u7ba1\u7406\uff08CRM\uff09\u30b7\u30b9\u30c6\u30e0\u306e\u30e2\u30c3\u30af\u30a2\u30c3\u30d7\u3092\u4f5c\u3063\u3066\u3002HTML\u30fbCSS\u30fbJavaScript\u306e\u307f\u306e\u30b7\u30f3\u30d7\u30eb\u306a\u69cb\u6210\u306b\u3057\u3066\u3002\n```\n\nBob\u304c\u30d5\u30a1\u30a4\u30eb\u3092\u4f5c\u308a\u59cb\u3081\u308b\u3002\u3057\u3070\u3089\u304f\u5f85\u3064\uff08\u74b0\u5883\u306b\u3088\u3063\u3066\u6570\u5341\u79d2\u301c\u6570\u5206\u304b\u304b\u308b\uff09\u3002\n\n**1-4. \u51fa\u6765\u4e0a\u304c\u308a\u3092\u78ba\u8a8d\u3059\u308b**\n\n1. \u30d5\u30a1\u30a4\u30eb\u4e00\u89a7\uff08\u30a8\u30af\u30b9\u30d7\u30ed\u30fc\u30e9\u30fc\uff09\u306b\u3001Bob\u304c\u4f5c\u3063\u305f\u30d5\u30a1\u30a4\u30eb\u304c\u4e26\u3076\n2. HTML\u30d5\u30a1\u30a4\u30eb\uff08\u4f8b: `index.html`\uff09\u3092\u30af\u30ea\u30c3\u30af\u3057\u3066\u4e2d\u8eab\u3092\u773a\u3081\u308b\n3. HTML\u30d5\u30a1\u30a4\u30eb\u3092\u53f3\u30af\u30ea\u30c3\u30af \u2192 **\u300c\u30a8\u30af\u30b9\u30d7\u30ed\u30fc\u30e9\u30fc\u3067\u8868\u793a\u3059\u308b\u300d**\uff08macOS\u306f **\u300cFinder\u3067\u8868\u793a\u3059\u308b\u300d**\uff09\u3092\u9078\u3076\n4. \u958b\u3044\u305f\u30d5\u30a9\u30eb\u30c0\u30fc\u306e\u4e2d\u306eHTML\u30d5\u30a1\u30a4\u30eb\u3092\u30c0\u30d6\u30eb\u30af\u30ea\u30c3\u30af\u3059\u308b\u3068\u3001\u30d6\u30e9\u30a6\u30b6\u30fc\u3067\u30e2\u30c3\u30af\u30a2\u30c3\u30d7\u304c\u8868\u793a\u3055\u308c\u308b\n\n> \ud83d\udcdd **\u3053\u3053\u3067\u632f\u308a\u8fd4\u308a**: Bob\u306f\u305d\u308c\u306a\u308a\u306e\u3082\u306e\u3092\u4f5c\u3063\u3066\u304f\u308c\u305f\u306f\u305a\u3067\u3059\u3002\u3067\u3082\u3001\u81ea\u5206\u304c\u601d\u3044\u63cf\u3044\u3066\u3044\u305f\u696d\u52d9\u306e\u6d41\u308c\u3084\u753b\u9762\u3068\u6bd4\u3079\u3066\u3001\u3069\u3046\u3067\u3057\u3087\u3046\uff1f \u300c\u3053\u3053\u304c\u9055\u3046\u300d\u300c\u3053\u308c\u304c\u8db3\u308a\u306a\u3044\u300d\u3068\u611f\u3058\u305f\u30dd\u30a4\u30f3\u30c8\u3092\u899a\u3048\u3066\u304a\u3044\u3066\u304f\u3060\u3055\u3044\u3002\u6b21\u306eLab\u3067\u3001\u305d\u306e\u5dee\u3092\u57cb\u3081\u308b\u65b9\u6cd5\u3092\u5b66\u3073\u307e\u3059\u3002\n\n---\n\n### Lab 2: \u8981\u4ef6\u30c6\u30f3\u30d7\u30ec\u30fc\u30c8\u3092\u4f5c\ 30c3\u30d7\u306e\u898b\u305f\u76ee\u3092\u5909\u3048\u308b\u3068\u540c\u6642\u306b\u3001\u8981\u4ef6\u5b9a\u7fa9\u306e\u8a18\u8ff0\u3082\u66f4\u65b0\u3055\u308c\u307e\u3059\u3002\u3053\u3046\u3057\u3066\u304a\u3051\u3070\u3001\u8981\u4ef6\u66f8\u3068\u30e2\u30c3\u30af\u30a2\u30c3\u30d7\u304c\u98df\u3044\u9055\u3046\u3053\u3068\u304c\u3042\u308a\u307e\u305b\u3093\u3002\n\n**5-3. \u3082\u3046\u4f55\u56de\u304b\u8a66\u3057\u3066\u307f\u308b\uff08\u6642\u9593\u304c\u3042\u308c\u3070\uff09**\n\n\u540c\u3058\u3084\u308a\u65b9\u3067\u3001\u597d\u307f\u306b\u5408\u308f\u305b\u3066\u3069\u3093\u3069\u3093\u6539\u5584\u3059\u308b\u3002\n\n\u4f8b:\n\n```\n\u753b\u9762\u5de6\u5074\u306b\u7e26\u578b\u306e\u30b5\u30a4\u30c9\u30d0\u30fc\u30fb\u30ca\u30d3\u30b2\u30fc\u30b7\u30e7\u30f3\uff08\u5e45250px\uff09\u3092\u8ffd\u52a0\u3057\u3066\u3001\u300c\u9867\u5ba2\u4e00\u89a7\u300d\u300c\u30c0\u30c3\u30b7\u30e5\u30dc\u30fc\u30c9\u300d\u300c\u8a2d\u5b9a\u300d\u306e\u30e1\u30cb\u30e5\u30fc\u3092\u7f6e\u3044\u3066\u3002crm_req.md \u306e\u753b\u9762\u69cb\u6210\u30bb\u30af\u30b7\u30e7\u30f3\u3082\u66f4\u65b0\u3057\u3066\u3002\n```\n\n```\n\u9867\u5ba2\u30ea\u30b9\u30c8\u306e\u5404\u884c\u306b\u3001\u30b9\u30c6\u30fc\u30bf\u30b9\u306b\u5fdc\u3058\u305f\u8272\u4ed8\u304d\u30d0\u30c3\u30b8\uff08\u65b0\u898f: \u9752\u3001\u5546\u8ac7\u4e2d: \u9ec4\u3001\u6210\u7d04: \u7dd1\u3001\u5931\u6ce8: \u8d64\uff09\u3092\u8868\u793a\u3057\u3066\u3002crm_req.md \u306e\u6a5f\u80fd\u8981\u4ef6\u30bb\u30af\u30b7\u30e7\u30f3\u3082\u66f4\u65b0\u3057\u3066\u3002\n```\n\n> \ud83d\udca1 \u6bce\u56de\u300ccrm_req.md\u3082\u66f4\u65b0\u3057\u3066\u300d\u3068\u4ed8\u3051\u308b\u306e\u3092\u5fd8\u308c\u305a\u306b\u3002\u3053\u308c\u304c\u4ed5\u69d8\u99c6\u52d5\u306e\u30ea\u30ba\u30e0\u3067\u3059\u3002\n\n---\n\n### Lab 6: \u8a2d\u8a08\u66f8\u3068\u4f7f\u3044\u65b9\u8aac\u660e\u66f8\u3092\u4f5c\u308b\uff083\u5206\uff09\n\n\u30e2\u30c3\u30af\u30a2\u30c3\u30d7\u304c\u4ed5\u4e0a\u304c\u3063\u305f\u3089\u3001\u6700\u5f8c\ hboard_readme.md`\uff08\u4f7f\u3044\u65b9\u8aac\u660e\u66f8\uff09\n\n```\n\u3010\u55b6\u696d\u30c0\u30c3\u30b7\u30e5\u30dc\u30fc\u30c9\u306e\u8ab2\u984c\u3011\n\nCRM\u306b\u84c4\u7a4d\u3055\u308c\u305f\u9867\u5ba2\u30c7\u30fc\u30bf\u3092\u4f7f\u3063\u3066\u3001\u55b6\u696d\u30c1\u30fc\u30e0\u5168\u4f53\u306e\n\u6d3b\u52d5\u72b6\u6cc1\u3092\u3072\u3068\u76ee\u3067\u628a\u63e1\u3067\u304d\u308b\u30c0\u30c3\u30b7\u30e5\u30dc\u30fc\u30c9\u304c\u5fc5\u8981\u3067\u3059\u3002\n\n\u25a0 \u30da\u30eb\u30bd\u30ca\n- \u55b6\u696d\u30de\u30cd\u30fc\u30b8\u30e3\u30fc\uff1a\u9ad8\u6a4b\u3055\u3093\uff0842\u6b73\u3001\u30c1\u30fc\u30e08\u540d\u3092\u7d71\u62ec\uff09\n- \u6bce\u671d\u30c1\u30fc\u30e0\u306e\u9032\u6357\u3092\u78ba\u8a8d\u3057\u305f\u3044\n- \u9031\u6b21\u4f1a\u8b70\u3067\u6570\u5b57\u3092\u3082\u3068\u306b\u8b70\u8ad6\u3057\u305f\u3044\n\n\u25a0 \u56f0\u3063\u3066\u3044\u308b\u3053\u3068\n- \u5546\u8ac7\u30d1\u30a4\u30d7\u30e9\u30a4\u30f3\u306e\u5168\u4f53\u50cf\u304c\u3064\u304b\u3081\u306a\u3044\n- \u30e1\u30f3\u30d0\u30fc\u3054\u3068\u306e\u9032\u6357\u30fb\u6210\u679c\u304c\u30d0\u30e9\u30d0\u30e9\u306b\u7ba1\u7406\u3055\u308c\u3066\u3044\u308b\n- \u58f2\u4e0a\u4e88\u6e2c\u3068\u76ee\u6a19\u306e\u9054\u6210\u5ea6\u5408\u3044\u304c\u3059\u3050\u308f\u304b\u3089\u306a\u3044\n\n\u25a0 \u5fc5\u9808\u6a5f\u80fd\uff08\u6700\u4f4e\u9650\u3053\u308c\u3060\u3051\u306f\u4f5c\u308b\uff09\n1. \u30d1\u30a4\u30d7\u30e9\u30a4\u30f3\u8868\u793a\uff08\u30b9\u30c6\u30fc\u30b8\u5225\u306e\u5546\u8ac7\u6570\u30fb\u91d1\u984d\uff09\n2. \u30c1\u30fc\u30e0\u30e1\u30f3\u30d0\u30fc\u5225\u306e\u5b9f\u7e3e\u4e00\u89a7\n3. \u58f2\u4e0a\u76ee\u6a19\u3068\u9054\u6210\u7387\u306e\u30b0\u30e9\u30d5\n\n\u25a0 \u3042\u308b\u3068\u5b09\u3057\u3044\u6a5f\u80fd\uff08\u6642\u9593\u304c\u3042\u308c\u3070\uff09\n- \u671f\u9593\uff08\u9031\u30fb\u6708\u30fb\u56db\u534a\u671f\uff09\u306e\u5207\u308a\u66ff\u3048\n- \u30a2\u30e9\u30fc\u30c8\u8868\u793a\uff08\u505c\u6ede\u3057\u3066\u3044\u308b\u5546\u8ac7\u3001\u671f\u9650\u8d85\u904e\u306a\u3069\uff09\n- \u524d\u671f\u6bd4\u30fb\u524d\u5e74\u6bd4\u306e\u6bd4\u8f03\n\n\u25a0 UX\u3067\u5927\u4e8b\u306b\u3057\u305f\u3044\u3053\u3068\n- \u6570\u5b57\u304c\u30d1\u30c3\u3068\u898b\u3067\u308f\u304b\u308bKPI\u30ab\u30fc\u30c9\n- \u30b0\u30e9\u30d5\u3084\u30c1\u30e3\u30fc\u30c8\u3067\u8996\u899a\u7684\u306b\u308f\u304b\u308a\u3084\u3059\u304f\n- \u671d\u306e3\u5206\u3067\u72b6\u6cc1\u3092\u3064\u304b\u3081\u308b\u30c7\u30b6\u30a4\u30f3\n\n\u25a0 \u696d\u754c\u5225\u306e\u9069\u7528\u4f8b\n- SaaS: MRR\u63a8\u79fb\u3001\u30c1\u30e3\u30fc\u30f3\u7387\u3001\u30a2\u30c3\u30d7\u30bb\u30eb\u7387\n- \u88fd\u9020: \u53d7\u6ce8\u6b8b\u3001\u7d0d\u671f\u9075\u5b88\u7387\u3001\u30ea\u30d4\u30fc\u30c8\u7387\n- \u5c0f\u58f2: \u5ba2\u5358\u4fa1\u63a8\u79fb\u3001\u65b0\u898f/\u65e2\u5b58\u6bd4\u7387\n- \u30b3\u30f3\u30b5\u30eb: \u7a3c\u50cd\u7387\u3001\u6848\u4ef6\u5358\u4fa1\u3001\u63d0\u6848\u52dd\u7387\n```\n\n#### \u8ab2\u984cB: \u63d0\u6848\u66f8\u30b8\u30a7\u30cd\u30ec\u30fc\u30bf\u30fc\n\n\u4f5c\u6210\u3059\u308b\u30d5\u30a1\u30a4\u30eb: `proposal_req.md`\uff08\u8981\u4ef6\u5b9a\u7fa9\uff09\u3001`proposal_design.md`\uff08\u8a2d\u8a08\u66f8\uff09\u3001`proposal_readme.md`\uff08\u4f7f\u3044\u65b9\u8aac\u660e\u66f8\uff09\n\n```\n\u3010\u63d0\u6848\u66f8\u30b8\u30a7\u30cd\u30ec\u30fc\u30bf\u30fc\u306e\u8ab2\u984c\u3011\n\n\u55b6\u696d\u62c5\u5f53\u8005\u304c\u5546\u8ac7\u306e\u524d\u306b\u3001\u9867\u5ba2\u306e\u72b6\u6cc1\u306b\u5408\u308f\u305b\u305f\u63d0\u6848\u66f8\u3092\n\u624b\u65e9\u304f\u4f5c\u308c\u308b\u30c4\u30fc\u30eb\u304c\u5fc5\u8981\u3067\u3059\u3002\n\n\u25a0 \u30da\u30eb\u30bd\u30ca\n- \u55b6\u696d\u62c5\u5f53\u8005\uff1a\u7530\u4e2d\u3055\u3093\uff0835\u6b73\u3001CRM\u306b\u9867\u5ba2\u30c7\u30fc\u30bf\u3092\u5165\u529b\u6e08\u307f\uff09\n- \u5546\u8ac7\u524d\u306e\u6e96\u5099\u306b\u6642\u9593\u3092\u304b\u3051\u305f\u304f\u306a\u3044\n- \u3067\u3082\u9867\u5ba2\u3054\u3068\u306b\u30ab\u30b9\u30bf\u30de\u30a4\u30ba\u3057\u305f\u63d0\u6848\u306f\u51fa\u3057\u305f\u3044\n\n\u25a0 \u56f0\u3063\u3066\u3044\u308b\u3053\u3068\n- \u63d0\u6848\u66f8\u3092\u30bc\u30ed\u304b\u3089\u4f5c\u308b\u306e\u306b\u6642\u9593\u304c\u304b\u304b\u308b\n- \u4eba\u306b\u3088\u3063\u3066\u30d5\u30a9\u30fc\u30de\u30c3\u30c8\u304c\u30d0\u30e9\u30d0\u30e9\n- \u904e\u53bb\u306e\u63d0\u6848\u5185\u5bb9\u3092\u53c2\u8003\u306b\u3057\u3065\u3089\u3044\n\n\u25a0 \u5fc5\u9808\u6a5f\u80fd\uff08\u6700\u4f4e\u9650\u3053\u308c\u3060\u3051\u306f\u4f5c\u308b\uff09\n1. \u9867\u5ba2\u9078\u629e\u753b\u9762\uff08CRM\u306e\u9867\u5ba2\u30ea\u30b9\u30c8\u304b\u3089\u9078\u3076\uff09\n2. \u63d0\u6848\u30c6\u30f3\u30d7\u30ec\u30fc\u30c8\u306e\u9078\u629e\u30fb\u7de8\u96c6\u753b\u9762\n3. \u63d0\u6848\u66f8\u30d7\u30ec\u30d3\u30e5\u30fc\u753b\u9762\uff08\u5370\u5237\u3084PDF\u3092\u60f3\u5b9a\u3057\u305f\u30ec\u30a4\u30a2\u30a6\u30c8\uff09\n\n\u25a0 \u3042\u308b\u3068\u5b09\u3057\u3044\u6a5f\u80fd\uff08\u6642\u9593\u304c\u3042\u308c\u3070\uff09\n- \u9867\u5ba2\u306e\u8ab2\u984c\u306b\u5fdc\u3058\u305f\u5546\u54c1/\u30b5\u30fc\u30d3\u30b9\u306e\u81ea\u52d5\u304a\u3059\u3059\u3081\n- \u904e\u53bb\u306e\u985e\u4f3c\u63d0\u6848\u306e\u53c2\u7167\n- \u63d0\u6848\u66f8\u306e\u4fdd\u5b58\u6a5f\u80fd\n\n\u25a0 UX\u3067\u5927\u4e8b\u306b\u3057\u305f\u3044\u3053\u3068\n- 3\u30b9\u30c6\u30c3\u30d7\u4ee5\u5185\u3067\u63d0\u6848\u66f8\u304c\u5b8c\u6210\u3059\u308b\u64cd\u4f5c\u306e\u624b\u8efd\u3055\n- \u304d\u3061\u3093\u3068\u3057\u305f\u898b\u305f\u76ee\u306e\u63d0\u6848\u66f8\u30c7\u30b6\u30a4\u30f3\n- \u30c6\u30f3\u30d7\u30ec\u30fc\u30c8\u3092\u9078\u3076\u3060\u3051\u3067\u5f62\u306b\u306a\u308b\u624b\u8efd\u3055\n\n\u25a0 \u696d\u754c\u5225\u306e\u9069\u7528\u4f8b\n- SaaS: \u6a5f\u80fd\u6bd4\u8f03\u8868\u3001ROI\u8a66\u7b97\u3092\u542b\u3080\u63d0\u6848\u66f8\n- \u88fd\u9020: \u88fd\u54c1\u4ed5\u69d8\u3001\u7d0d\u671f\u30fb\u4fa1\u683c\u4e00\u89a7\u306e\u898b\u7a4d\u63d0\u6848\n- \u5c0f\u58f2: \u5546\u54c1\u30e9\u30a4\u30f3\u30ca\u30c3\u30d7\u3001\u30dc\u30ea\u30e5\u30fc\u30e0\u30fb\u30c7\u30a3\u30b9\u30ab\u30a6\u30f3\u30c8\u63d0\u6848\n- \u30b3\u30f3\u30b5\u30eb: \u30b5\u30fc\u30d3\u30b9\u6982\u8981\u3001\u30d7\u30ed\u30b8\u30a7\u30af\u30c8\u8a08\u753b\u3001\u8cbb\u7528\u5185\u8a33\n```\n\n#### \u671f\u5f85\u3055\u308c\u308b\u6210\u679c\u7269\n- \u9078\u3093\u3060\u8ab2\u984c\u306e\u30e2\u30c3\u30af\u30a2\u30c3\u30d7\uff08HTML\u30d5\u30a1\u30a4\u30eb\uff09\n- \u8981\u4ef6\u5b9a\u7fa9\uff08`dashboard_req.md` \u307e\u305f\u306f `proposal_req.md`\uff09\n- \u8a2d\u8a08\u66f8\uff08`dashboard_design.md` \u307e\u305f\u306f `proposal_design.md`\uff09\n- \u4f7f\u3044\u65b9\u8aac\u660e\u66f8\uff08`dashboard_readme.md` \u307e\u305f\u306f `proposal_readme.md`\uff09\n\n---\n\n### \u5f79\u52722: \u30de\u30fc\u30b1\u30c6\u30a3\u30f3\u30b0\u62c5\u5f53 \u2014\u300c\u30ad\u30e3\u30f3\u30da\u30fc\u30f3\u7ba1\u7406\u30c0\u30c3\u30b7\u30e5\u30dc\u30fc\u30c9\u300d\n\n\u4f5c\u6210\u3059\u308b\u30d5\u30a1\u30a4\u30eb: `campaign_req.md`\uff08\u8981\u4ef6\u5b9a\u7fa9\uff09\u3001`campaign_design.md`\uff08\u8a2d\u8a08\u66f8\uff09\u3001`campaign_readme.md`\uff08\u4f7f\u3044\u65b9\u8aac\u660e\u66f8\uff09\n\n#### \u8ab2\u984c\u30ab\u30fc\u30c9\n\n```\n\u3010\u30de\u30fc\u30b1\u30c6\u30a3\u30f3\u30b0\u30c1\u30fc\u30e0\u306e\u8ab2\u984c\u3011\n\n\u65b0\u898f\u9867\u5ba2\u3092\u7372\u5f97\u3059\u308b\u305f\u3081\u3001\u3044\u308d\u3044\u308d\u306a\u30de\u30fc\u30b1\u30c6\u30a3\u30f3\u30b0\u65bd\u7b56\u3092\n\u8d70\u3089\u305b\u3066\u3044\u307e\u3059\u3002\u5404\u65bd\u7b56\u306e\u52b9\u679c\u3092\u898b\u3048\u308b\u5316\u3057\u3066\u3001\n\u3069\u3053\u306b\u30ea\u30bd\u30fc\u30b9\u3092\u96c6\u4e2d\u3059\u3079\u304d\u304b\u5224\u65ad\u3057\u305f\u3044\u3067\u3059\u3002\n\n\u25a0 \u30da\u30eb\u30bd\u30ca\n- \u30de\u30fc\u30b1\u30c6\u30a3\u30f3\u30b0\u62c5\u5f53\u8005\uff1a\u4f50\u85e4\u3055\u3093\uff0832\u6b73\u3001\u30c7\u30b8\u30bf\u30eb\u30fb\u30de\u30fc\u30b1\u30c6\u30a3\u30f3\u30b0\u7d4c\u9a133\u5e74\uff09\n- \u8907\u6570\u306e\u65bd\u7b56\u3092\u540c\u6642\u306b\u8d70\u3089\u305b\u3066\u3044\u308b\n- \u30c7\u30fc\u30bf\u3092\u898b\u3066\u5224\u65ad\u3057\u305f\u3044\n\n\u25a0 \u56f0\u3063\u3066\u3044\u308b\u3053\u3068\n- \u65bd\u7b56\u304c\u5897\u3048\u3066\u304d\u3066\u3001\u5168\u4f53\u306e\u72b6\u6cc1\u304c\u628a\u63e1\u3057\u3065\u3089\u3044\n- \u65bd\u7b56\u3054\u3068\u306e\u6210\u679c\uff08\u30ea\u30fc\u30c9\u6570\u3001\u30b3\u30f3\u30d0\u30fc\u30b8\u30e7\u30f3\u7387\u3001ROI\uff09\u3092\u6a2a\u4e26\u3073\u3067\u6bd4\u8f03\u3067\u304d\u306a\u3044\n- \u3069\u306e\u65bd\u7b56\u306b\u6ce8\u529b\u3059\u3079\u304d\u304b\u3001\u611f\u899a\u3067\u5224\u65ad\u3057\u3066\u3057\u307e\u3063\u3066\u3044\u308b\n\n\u25a0 \u5fc5\u9808\u6a5f\u80fd\uff08\u6700\u4f4e\u9650\u3053\u308c\u3060\u3051\u306f\u4f5c\u308b\uff09\n1. \u65bd\u7b56\u4e00\u89a7\uff08\u65bd\u7b56\u540d\u3001\u5b9f\u65bd\u671f\u9593\u3001\u30b9\u30c6\u30fc\u30bf\u30b9\uff09\n2. \u65bd\u7b56\u306e\u8a73\u7d30\u753b\u9762\uff08\u76ee\u6a19\u3001\u5b9f\u7e3e\u3001\u9032\u6357\u7387\uff09\n3. \u6210\u679c\u3092\u6bd4\u8f03\u3059\u308b\u30b0\u30e9\u30d5\u30fb\u30c1\u30e3\u30fc\u30c8\n\n\u25a0 \u3042\u308b\u3068\u5b09\u3057\u3044\u6a5f\u80fd\uff08\u6642\u9593\u304c\u3042\u308c\u3070\uff09\n- \u65bd\u7b56\u540c\u58eb\u306e\u6bd4\u8f03\u6a5f\u80fd\n- \u30ea\u30a2\u30eb\u30bf\u30a4\u30e0\u66f4\u65b0\u98a8\u306e\u30c0\u30c3\u30b7\u30e5\u30dc\u30fc\u30c9\n- \u76ee\u6a19\u672a\u9054\u6642\u306e\u30a2\u30e9\u30fc\u30c8\u8868\u793a\n\n\u25a0 UX\u3067\u5927\u4e8b\u306b\u3057\u305f\u3044\u3053\u3068\n- \u30c7\u30fc\u30bf\u304c\u3071\u3063\u3068\u898b\u3066\u7406\u89e3\u3067\u304d\u308b\u30b0\u30e9\u30d5\n- \u5927\u4e8b\u306a\u6570\u5b57\u304c\u76ee\u7acb\u3064\u30ec\u30a4\u30a2\u30a6\u30c8\n- \u898b\u3066\u3044\u3066\u697d\u3057\u304f\u306a\u308b\u30ab\u30e9\u30d5\u30eb\u306aUI\n\n\u25a0 \u696d\u754c\u5225\u306e\u9069\u7528\u4f8b\n- EC: \u5e83\u544a\u30ad\u30e3\u30f3\u30da\u30fc\u30f3\u3001CVR\u3001\u5ba2\u5358\u4fa1\n- SaaS: \u30c8\u30e9\u30a4\u30a2\u30eb\u767b\u9332\u6570\u3001\u6709\u6599\u8ee2\u63db\u7387\u3001MRR\u6210\u9577\n- \u6559\u80b2: \u30bb\u30df\u30ca\u30fc\u96c6\u5ba2\u3001\u7533\u8fbc\u7387\u3001\u6e80\u8db3\u5ea6\n- \u88fd\u9020: \u5c55\u793a\u4f1a\u51fa\u5c55\u3001\u5546\u8ac7\u5316\u7387\u3001\u53d7\u6ce8\u7387\n```\n\n#### \u671f\u5f85\u3055\u308c\u308b\u6210\u679c\u7269\n- **\u753b\u9762\u69cb\u6210**: \u30c0\u30c3\u30b7\u30e5\u30dc\u30fc\u30c9\uff08\u5168\u4f53\u6982\u8981\uff09 \u2192 \u65bd\u7b56\u4e00\u89a7 \u2192 \u65bd\u7b56\u306e\u8a73\u7d30\u5206\u6790\n- **\u30c7\u30e2\u30fb\u30b7\u30ca\u30ea\u30aa\u4f8b**: \u300c\u4f50\u85e4\u3055\u3093\u304c\u6708\u6b21\u30ec\u30d3\u30e5\u30fc\u524d\u306b\u30013\u3064\u306e\u65bd\u7b56\u306e\u6210\u679c\u3092\u6bd4\u8f03\u3057\u3001\u6b21\u6708\u306b\u6ce8\u529b\u3059\u308b\u65bd\u7b56\u3092\u6c7a\u3081\u308b\u300d\n\n#### \u30aa\u30d7\u30b7\u30e7\u30f3\u8ab2\u984c\n\u65b0\u5546\u54c1/\u30b5\u30fc\u30d3\u30b9\u3092\u30a2\u30d4\u30fc\u30eb\u3059\u308b\u30e9\u30f3\u30c7\u30a3\u30f3\u30b0\u30fb\u30da\u30fc\u30b8\u3092\u4f5c\u3063\u3066\u307f\u307e\u3057\u3087\u3046\uff08\u5546\u54c1\u7279\u5fb4\u3001\u30d9\u30cd\u30d5\u30a3\u30c3\u30c8\u3001CTA\u3001\u7533\u8fbc\u30d5\u30a9\u30fc\u30e0\u306a\u3069\uff09\u3002\n\n---\n\n### \u5f79\u52723: \u9867\u5ba2\u7ba1\u7406\u62c5\u5f53 \u2014\u300c\u9867\u5ba2\u30dd\u30fc\u30bf\u30eb\u300d\n\n\u4f5c\u6210\u3059\u308b\u30d5\u30a1\u30a4\u30eb: `portal_req.md`\uff08\u8981\u4ef6\u5b9a\u7fa9\uff09\u3001`portal_design.md`\uff08\u8a2d\u8a08\u66f8\uff09\u3001`portal_readme.md`\uff08\u4f7f\u3044\u65b9\u8aac\u660e\u66f8\uff09\n\n#### \u8ab2\u984c\u30ab\u30fc\u30c9\n\n```\n\u3010\u9867\u5ba2\u7ba1\u7406\u30c1\u30fc\u30e0\u306e\u8ab2\u984c\u3011\n\n\u304a\u5ba2\u69d8\u304c\u81ea\u5206\u306e\u60c5\u5831\u3092\u78ba\u8a8d\u3057\u305f\u308a\u3001\u3061\u3087\u3063\u3068\u3057\u305f\u624b\u7d9a\u304d\u3092\n\u30aa\u30f3\u30e9\u30a4\u30f3\u3067\u6e08\u307e\u305b\u3089\u308c\u308b\u30dd\u30fc\u30bf\u30eb\u30fb\u30b5\u30a4\u30c8\u304c\u5fc5\u8981\u3067\u3059\u3002\n\n\u25a0 \u30da\u30eb\u30bd\u30ca\n- \u9867\u5ba2\uff1a\u9234\u6728\u3055\u3093\uff0842\u6b73\u3001\u4f1a\u793e\u54e1\u3001\u30b5\u30fc\u30d3\u30b9\u5229\u7528\u4e2d\uff09\n- \u5fd9\u3057\u304f\u3066\u55b6\u696d\u6642\u9593\u5185\u306b\u96fb\u8a71\u3067\u304d\u306a\u3044\n- \u30b9\u30de\u30db\u3067\u30b5\u30af\u30c3\u3068\u78ba\u8a8d\u30fb\u624b\u7d9a\u304d\u3057\u305f\u3044\n\n\u25a0 \u56f0\u3063\u3066\u3044\u308b\u3053\u3068\n- \u81ea\u5206\u306e\u5229\u7528\u72b6\u6cc1\u3084\u8cfc\u5165\u5c65\u6b74\u3092\u78ba\u8a8d\u3059\u308b\u624b\u6bb5\u304c\u306a\u3044\n- \u4f4f\u6240\u5909\u66f4\u306a\u3069\u306e\u624b\u7d9a\u304d\u306b\u96fb\u8a71\u304c\u5fc5\u8981\u3067\u9762\u5012\n- \u554f\u3044\u5408\u308f\u305b\u3057\u305f\u5185\u5bb9\u304c\u3069\u3046\u306a\u3063\u3066\u3044\u308b\u304b\u308f\u304b\u3089\u306a\u3044\n\n\u25a0 \u5fc5\u9808\u6a5f\u80fd\uff08\u6700\u4f4e\u9650\u3053\u308c\u3060\u3051\u306f\u4f5c\u308b\uff09\n1. \u30de\u30a4\u30da\u30fc\u30b8\uff08\u5229\u7528\u72b6\u6cc1\u3001\u57fa\u672c\u60c5\u5831\u306e\u8868\u793a\uff09\n2. \u8a73\u7d30\u753b\u9762\uff08\u30b5\u30fc\u30d3\u30b9\u5185\u5bb9\u3001\u6599\u91d1\u3001\u5229\u7528\u671f\u9593\uff09\n3. \u60c5\u5831\u5909\u66f4\u30d5\u30a9\u30fc\u30e0\uff08\u4f4f\u6240\u3001\u9023\u7d61\u5148\u306e\u5909\u66f4\uff09\n\n\u25a0 \u3042\u308b\u3068\u5b09\u3057\u3044\u6a5f\u80fd\uff08\u6642\u9593\u304c\u3042\u308c\u3070\uff09\n- \u5404\u7a2e\u7533\u8acb\u30d5\u30a9\u30fc\u30e0\n- \u3088\u304f\u3042\u308b\u8cea\u554f\uff08FAQ\uff09\n- \u30c1\u30e3\u30c3\u30c8\u30fb\u30dc\u30c3\u30c8\u98a8\u306e\u30d8\u30eb\u30d7\n\n\u25a0 UX\u3067\u5927\u4e8b\u306b\u3057\u305f\u3044\u3053\u3068\n- \u5b89\u5fc3\u611f\u306e\u3042\u308b\u30c7\u30b6\u30a4\u30f3\uff08\u304a\u91d1\u3084\u500b\u4eba\u60c5\u5831\u306b\u95a2\u308f\u308b\u306e\u3067\uff09\n- \u5c02\u9580\u7528\u8a9e\u3092\u4f7f\u308f\u305a\u3001\u308f\u304b\u308a\u3084\u3059\u3044\u8a00\u8449\u3067\n- \u5e74\u9f62\u3092\u554f\u308f\u305a\u4f7f\u3044\u3084\u3059\u3044UI\n\n\u25a0 \u696d\u754c\u5225\u306e\u9069\u7528\u4f8b\n- SaaS: \u5229\u7528\u72b6\u6cc1\u3001\u30d7\u30e9\u30f3\u5909\u66f4\u3001\u8acb\u6c42\u66f8\u78ba\u8a8d\n- EC: \u6ce8\u6587\u5c65\u6b74\u3001\u914d\u9001\u72b6\u6cc1\u3001\u8fd4\u54c1\u7533\u8acb\n- \u30b5\u30d6\u30b9\u30af: \u5951\u7d04\u5185\u5bb9\u3001\u652f\u6255\u3044\u5c65\u6b74\u3001\u89e3\u7d04\u624b\u7d9a\u304d\n- \u6559\u80b2: \u53d7\u8b1b\u5c65\u6b74\u3001\u6210\u7e3e\u78ba\u8a8d\u3001\u30b3\u30fc\u30b9\u5909\u66f4\n```\n\n#### \u671f\u5f85\u3055\u308c\u308b\u6210\u679c\u7269\n- **\u753b\u9762\u69cb\u6210**: \u30ed\u30b0\u30a4\u30f3 \u2192 \u30de\u30a4\u30da\u30fc\u30b8 \u2192 \u8a73\u7d30 \u2192 \u5404\u7a2e\u624b\u7d9a\u304d\n- **\u30c7\u30e2\u30fb\u30b7\u30ca\u30ea\u30aa\u4f8b**: \u300c\u9234\u6728\u3055\u3093\u304c\u5f15\u3063\u8d8a\u3057\u5f8c\u3001\u30b9\u30de\u30db\u304b\u3089\u4f4f\u6240\u5909\u66f4\u306e\u624b\u7d9a\u304d\u3092\u6e08\u307e\u305b\u308b\u300d\n\n#### \u30aa\u30d7\u30b7\u30e7\u30f3\u8ab2\u984c\n\u65b0\u898f\u7533\u8fbc\u3084\u8cfc\u5165\u304c\u3067\u304d\u308b\u30a2\u30d7\u30ea\u306e\u30e2\u30c3\u30af\u30a2\u30c3\u30d7\u3092\u4f5c\u3063\u3066\u307f\u307e\u3057\u3087\u3046\u3002\u5165\u529b\u306e\u624b\u9593\u3092\u6e1b\u3089\u3059\u5de5\u592b\u3001\u6700\u9069\u306a\u5546\u54c1/\u30b5\u30fc\u30d3\u30b9\u3092\u9078\u3079\u308b\u6a5f\u80fd\u306a\u3069\u3001\u4f7f\u3044\u3084\u3059\u3055\u306b\u3053\u3060\u308f\u3063\u3066\u307f\u3066\u304f\u3060\u3055\u3044\u3002\n\n---\n\n### \u5f79\u52724: \u4eba\u4e8b\u62c5\u5f53 \u2014\u300c\u793e\u54e1\u30aa\u30f3\u30dc\u30fc\u30c7\u30a3\u30f3\u30b0\u30fb\u30b7\u30b9\u30c6\u30e0\u300d\n\n\u4f5c\u6210\u3059\u308b\u30d5\u30a1\u30a4\u30eb: `onboarding_req.md`\uff08\u8981\u4ef6\u5b9a\u7fa9\uff09\u3001`onboarding_design.md`\uff08\u8a2d\u8a08\u66f8\uff09\u3001`onboarding_readme.md`\uff08\u4f7f\u3044\u65b9\u8aac\u660e\u66f8\uff09\n\n> \ud83d\udca1 \u793e\u5185\u30ac\u30a4\u30c9\u306e\u6587\u7ae0\u3092\u7528\u610f\u3057\u3066\u304a\u304f\u3068\u3001\u30e2\u30c3\u30af\u30a2\u30c3\u30d7\u306e\u5b8c\u6210\u5ea6\u304c\u4e0a\u304c\u308a\u307e\u3059\u3002\u5148\u306b\u300c\u793e\u5185\u30ac\u30a4\u30c9\u306e\u6587\u7ae0\u3092\u4f5c\u308a\u305f\u3044\u300d\u3068Bob\u306b\u76f8\u8ac7\u3057\u3066\u307f\u307e\u3057\u3087\u3046\u3002\n\n#### \u8ab2\u984c\u30ab\u30fc\u30c9\n\n```\n\u3010\u4eba\u4e8b\u30c1\u30fc\u30e0\u306e\u8ab2\u984c\u3011\n\n\u65b0\u898f\u4e8b\u696d\u304c\u8ecc\u9053\u306b\u4e57\u308a\u59cb\u3081\u3001\u65b0\u3057\u3044\u30e1\u30f3\u30d0\u30fc\u304c\u7d9a\u3005\u3068\u5165\u793e\u4e2d\u3002\n\u65b0\u5165\u793e\u54e1\u304c\u30b9\u30e0\u30fc\u30ba\u306b\u696d\u52d9\u306b\u5165\u308c\u308b\u30aa\u30f3\u30dc\u30fc\u30c7\u30a3\u30f3\u30b0\u306e\u4ed5\u7d44\u307f\u304c\u5fc5\u8981\u3067\u3059\u3002\n\n\u25a0 \u30da\u30eb\u30bd\u30ca\n- \u65b0\u5165\u793e\u54e1\uff1a\u5c71\u672c\u3055\u3093\uff0826\u6b73\u3001\u5165\u793e1\u9031\u9593\u76ee\uff09\n- \u899a\u3048\u308b\u3053\u3068\u304c\u591a\u304f\u3066\u4e0d\u5b89\n- \u4f55\u3092\u3059\u308c\u3070\u3044\u3044\u304b\u3001\u3059\u3050\u77e5\u308a\u305f\u3044\n\n\u25a0 \u56f0\u3063\u3066\u3044\u308b\u3053\u3068\n- \u5165\u793e\u5f8c\u306b\u3084\u308b\u3079\u304d\u30bf\u30b9\u30af\u306e\u5168\u4f53\u50cf\u304c\u3064\u304b\u3081\u306a\u3044\n- \u793e\u5185\u30eb\u30fc\u30eb\u3084\u5236\u5ea6\u304c\u3069\u3053\u306b\u66f8\u3044\u3066\u3042\u308b\u304b\u308f\u304b\u3089\u306a\u3044\n- \u8ab0\u306b\u805e\u3051\u3070\u3044\u3044\u304b\u308f\u304b\u3089\u306a\u3044\n\n\u25a0 \u5fc5\u9808\u6a5f\u80fd\uff08\u6700\u4f4e\u9650\u3053\u308c\u3060\u3051\u306f\u4f5c\u308b\uff09\n1. \u30aa\u30f3\u30dc\u30fc\u30c7\u30a3\u30f3\u30b0\u30fb\u30c1\u30a7\u30c3\u30af\u30ea\u30b9\u30c8\uff08\u9032\u6357\u30d0\u30fc\u4ed8\u304d\uff09\n2. \u793e\u5185\u30ac\u30a4\u30c9\uff08\u4f1a\u793e\u6982\u8981\u3001\u30eb\u30fc\u30eb\u3001\u798f\u5229\u539a\u751f\u306e\u307e\u3068\u3081\uff09\n3. \u7d44\u7e54\u56f3\u3068\u30e1\u30f3\u30d0\u30fc\u7d39\u4ecb\n\n\u25a0 \u3042\u308b\u3068\u5b09\u3057\u3044\u6a5f\u80fd\uff08\u6642\u9593\u304c\u3042\u308c\u3070\uff09\n- \u7814\u4fee\u30b9\u30b1\u30b8\u30e5\u30fc\u30eb\u306e\u8868\u793a\n- \u30e1\u30f3\u30bf\u30fc\u7d39\u4ecb\u30fb\u9023\u7d61\u6a5f\u80fd\n- \u65b0\u5165\u793e\u54e1\u5411\u3051FAQ\n\n\u25a0 UX\u3067\u5927\u4e8b\u306b\u3057\u305f\u3044\u3053\u3068\n- \u89aa\u3057\u307f\u3084\u3059\u304f\u3001\u6c17\u5f8c\u308c\u3057\u306a\u3044\u30c7\u30b6\u30a4\u30f3\n- \u9032\u6357\u304c\u898b\u3048\u308b\u4ed5\u639b\u3051\uff08\u9032\u6357\u30d0\u30fc\u3001\u30c1\u30a7\u30c3\u30af\u30de\u30fc\u30af\u306a\u3069\uff09\n- \u8ff7\u308f\u306a\u3044\u30ca\u30d3\u30b2\u30fc\u30b7\u30e7\u30f3\n\n\u25a0 \u696d\u754c\u5225\u306e\u9069\u7528\u4f8b\n- \u5168\u696d\u754c\u5171\u901a\u3067\u4f7f\u3048\u308b\n- \u696d\u754c\u3054\u3068\u306b\u7814\u4fee\u5185\u5bb9\uff08\u88fd\u54c1\u77e5\u8b58\u3001\u696d\u754c\u30eb\u30fc\u30eb\u306a\u3069\uff09\u3092\u8ffd\u52a0\n```\n\n#### \u671f\u5f85\u3055\u308c\u308b\u6210\u679c\u7269\n- **\u753b\u9762\u69cb\u6210**: \u30a6\u30a7\u30eb\u30ab\u30e0\u753b\u9762 \u2192 \u30c1\u30a7\u30c3\u30af\u30ea\u30b9\u30c8 \u2192 \u793e\u5185\u30ac\u30a4\u30c9 \u2192 \u30e1\u30f3\u30d0\u30fc\u7d39\u4ecb\n- **\u30c7\u30e2\u30fb\u30b7\u30ca\u30ea\u30aa\u4f8b**: \u300c\u5c71\u672c\u3055\u3093\u304c\u5165\u793e1\u9031\u9593\u76ee\u306b\u3001\u4eca\u65e5\u3084\u308b\u3079\u304d\u30bf\u30b9\u30af\u3092\u78ba\u8a8d\u3057\u3001\u308f\u304b\u3089\u306a\u3044\u3053\u3068\u3092\u30e1\u30f3\u30bf\u30fc\u306b\u805e\u304f\u300d\n\n#### \u30aa\u30d7\u30b7\u30e7\u30f3\u8ab2\u984c\n\u5165\u793e\u5f8c\u306b\u5f79\u7acb\u3064\u4eba\u4e8b\u30b7\u30b9\u30c6\u30e0\u3092\u8003\u3048\u3066\u3001\u30e2\u30c3\u30af\u30a2\u30c3\u30d7\u3092\u4f5c\u3063\u3066\u307f\u307e\u3057\u3087\u3046\uff08\u52e4\u6020\u7ba1\u7406\u3001\u8a55\u4fa1\u30b7\u30b9\u30c6\u30e0\u3001\u793e\u5185SNS\u3001\u30b9\u30ad\u30eb\u7ba1\u7406\u306a\u3069\uff09\u3002\n\n---\n\n## \ud83e\udde9 \u30aa\u30d7\u30b7\u30e7\u30f3\u8ab2\u984c: \u8a08\u753b\u99c6\u52d5\u306e\u958b\u767a\n\n\u6642\u9593\u306b\u4f59\u88d5\u304c\u3042\u308b\u65b9\u3084\u3001\u3082\u3046\u5c11\u3057\u672c\u683c\u7684\u306a\u9032\u3081\u65b9\u3092\u8a66\u3057\u305f\u3044\u65b9\u306f\u3001\u8a08\u753b\u99c6\u52d5\u306e\u958b\u767a\u306b\u6311\u6226\u3057\u3066\u307f\u307e\u3057\u3087\u3046\u3002\n\n> \ud83d\udca1 **Plan\u30e2\u30fc\u30c9\u3068\u306f**: \u3044\u304d\u306a\u308a\u30b3\u30fc\u30c9\u3092\u66f8\u304f\u306e\u3067\u306f\u306a\u304f\u3001Bob\u3068\u5bfe\u8a71\u3057\u306a\u304c\u3089\u8a08\u753b\u3092\u7acb\u3066\u3066\u304b\u3089\u958b\u767a\u306b\u5165\u308b\u30e2\u30fc\u30c9\u3067\u3059\u3002Bob 2.0\u3067\u306f `/plan` \u306e\u4ee3\u308f\u308a\u306b\u30c1\u30e3\u30c3\u30c8\u3067\u300c\u8a08\u753b\u3092\u7acb\u3066\u305f\u3044\u300d\u3068\u4f1d\u3048\u308b\u3053\u3068\u3067\u540c\u69d8\u306e\u9032\u3081\u65b9\u304c\u3067\u304d\u307e\u3059\u3002\n\n#### \u624b\u9806\n\n**O-1. \u8a08\u753b\u306e\u4f5c\u6210\u3092\u983c\u3080**\n\n\u65b0\u3057\u3044\u30d5\u30a9\u30eb\u30c0\u30fc\u3092\u4f5c\u3063\u3066\u958b\u304f\u304b\u3001\u65e2\u5b58\u306e\u30d5\u30a9\u30eb\u30c0\u30fc\u3067\u4f5c\u696d\u3059\u308b\u3002\u30c1\u30e3\u30c3\u30c8\u6b04\u306b\u4ee5\u4e0b\u3092\u5165\u529b\u3057\u3066\u9001\u4fe1\u3059\u308b\u3002\n\n```\n\u9867\u5ba2\u95a2\u4fc2\u7ba1\u7406\uff08CRM\uff09\u30b7\u30b9\u30c6\u30e0\u306eWeb\u30e2\u30c3\u30af\u30a2\u30c3\u30d7\u3092\u4f5c\u308a\u305f\u3044\u306e\u3067\u3001\u8a08\u753b\u3092\u7acb\u3066\u305f\u3044\u3002\u4ee5\u4e0b\u306e\u6761\u4ef6\u3067\u9032\u3081\u305f\u3044\u3002\n- Web\u30b5\u30fc\u30d0\u30fc\u306f\u4f7f\u308f\u305a\u3001HTML\u30d5\u30a1\u30a4\u30eb\u3092\u30d6\u30e9\u30a6\u30b6\u30fc\u3067\u958b\u304f\u3060\u3051\u3067\u52d5\u304f\u3088\u3046\u306b\u3059\u308b\n- \u8a08\u753b\u3084\u8981\u4ef6\u306a\u3069\u306e\u9014\u4e2d\u7d4c\u904e\u306f\u30de\u30fc\u30af\u30c0\u30a6\u30f3\u30fb\u30d5\u30a1\u30a4\u30eb\u306b\u8a18\u9332\u3059\u308b\n- \u8981\u4ef6\u306f\u79c1\u3068\u4e00\u7dd2\u306b\u6c7a\u3081\u305f\u3044\n```\n\n**O-2. Bob\u3068\u4e00\u7dd2\u306b\u8981\u4ef6\u3092\u8a70\u3081\u308b**\n\nBob\u304c\u8cea\u554f\u3084\u63d0\u6848\u3092\u3057\u3066\u304f\u308b\u3002\u4ee5\u4e0b\u306e\u3088\u3046\u306a\u70b9\u3092\u76f8\u8ac7\u3057\u306a\u304c\u3089\u6c7a\u3081\u3066\u3044\u304f\uff1a\n\n- \u3069\u3093\u306a\u753b\u9762\u304c\u5fc5\u8981\u304b\uff08\u753b\u9762\u69cb\u6210\uff09\n- \u4f55\u304b\u3089\u4f5c\u308b\u304b\uff08\u512a\u5148\u9806\u4f4d\uff09\n- \u8272\u3084\u30ec\u30a4\u30a2\u30a6\u30c8\u306e\u65b9\u91dd\uff08\u30c7\u30b6\u30a4\u30f3\uff09\n- \u3069\u3093\u306a\u30c7\u30fc\u30bf\u3092\u8868\u793a\u3059\u308b\u304b\n\n**O-3. \u8a08\u753b\u3092\u3082\u3068\u306b\u5b9f\u88c5\u3059\u308b**\n\n\u8981\u4ef6\u304c\u56fa\u307e\u3063\u305f\u3089\u3001\u4ee5\u4e0b\u3092\u5165\u529b\u3057\u3066\u5b9f\u88c5\u3092\u59cb\u3081\u308b\u3002\n\n```\n\u3053\u306e\u8a08\u753b\u3092\u5b9f\u88c5\u3057\u3066\n```\n\n> \ud83d\udcdd **\u8a08\u753b \u2192 \u5b9f\u88c5\u306e\u6d41\u308c**: \u5148\u306bBob\u3068\u65b9\u91dd\u3092\u3059\u308a\u5408\u308f\u305b\u3066\u304b\u3089\u5b9f\u88c5\u3059\u308b\u3002\u30c1\u30fc\u30e0\u958b\u767a\u3067\u3082\u4f7f\u3048\u308b\u3084\u308a\u65b9\u3067\u3059\u3002\u300c\u4f55\u3092\u4f5c\u308b\u304b\u300d\u3092\u5148\u306b\u5408\u610f\u3057\u3066\u304a\u304f\u3053\u3068\u3067\u3001\u624b\u623b\u308a\u3092\u6e1b\u3089\u305b\u307e\u3059\u3002\n\n---\n\n## \ud83d\udee0\ufe0f \u4ed8\u9332: IBM Bob \u4f7f\u3044\u65b9\u30ac\u30a4\u30c9\u30e9\u30a4\u30f3\n\n### Bob\u306e\u4e3b\u306a\u30b3\u30de\u30f3\u30c9\n\nIBM Bob\u306b\u306f\u3001\u7528\u9014\u306b\u5fdc\u3058\u305f\u30b3\u30de\u30f3\u30c9\uff08\u30e2\u30fc\u30c9\uff09\u304c\u3042\u308b\u3002\n\n| \u30e2\u30fc\u30c9 | \u3044\u3064\u4f7f\u3046 | \u4f8b |\n|---|---|---|\n| Ask\uff08\u8cea\u554f\u30fb\u8abf\u67fb\uff09 | \u3061\u3087\u3063\u3068\u3057\u305f\u76f8\u8ac7\u3084\u8cea\u554f\u3001\u8abf\u67fb\u30fb\u5206\u6790 | \u300cCRM\u306e\u753b\u9762\u69cb\u6210\u3092\u8003\u3048\u3066\u300d |\n| Agent\uff08\u5b9f\u88c5\u30fb\u7de8\u96c6\uff09 | \u30b3\u30fc\u30c9\u306e\u4f5c\u6210\u30fb\u4fee\u6b63\u3001\u30d5\u30a1\u30a4\u30eb\u306e\u64cd\u4f5c | \u300ccrm_req.md\u3092\u5b9f\u88c5\u3057\u3066\u300d |\n\n> \ud83d\udca1 \u8a73\u3057\u304f\u306f [IBM Bob IDE\u30c9\u30ad\u30e5\u30e1\u30f3\u30c8](https://bob.ibm.com/docs/ide) \u3092\u53c2\u7167\u3057\u3066\u304f\u3060\u3055\u3044\u3002\n\n### Bob\u3078\u306e\u983c\u307f\u65b9\u306e\u30b3\u30c4\n\n#### \u3046\u307e\u304f\u3044\u304f\u983c\u307f\u65b9\n\n- \u300c\u55b6\u696d\u62c5\u5f53\u8005\u5411\u3051\u306e\u9867\u5ba2\u30ea\u30b9\u30c8\u753b\u9762\u3092\u4f5c\u3063\u3066\u3002\u540d\u524d\u30fb\u5c5e\u6027\u30fb\u30b9\u30c6\u30fc\u30bf\u30b9\u3092\u30ab\u30fc\u30c9\u5f62\u5f0f\u3067\u4e26\u3079\u3066\u3002\u300d \u2192 \u8ab0\u5411\u3051\u304b\u3001\u4f55\u3092\u8868\u793a\u3059\u308b\u304b\u3001\u30ec\u30a4\u30a2\u30a6\u30c8\u304c\u660e\u78ba\n- \u300c\u691c\u7d22\u30dc\u30c3\u30af\u30b9\u3092\u4e0a\u90e8\u306b\u8ffd\u52a0\u3057\u3066\u3001\u540d\u524d\u306e\u90e8\u5206\u4e00\u81f4\u3067\u9867\u5ba2\u30ea\u30b9\u30c8\u3092\u7d5e\u308a\u8fbc\u3081\u308b\u3088\u3046\u306b\u3057\u3066\u3002\u300d \u2192 \u5834\u6240\u3068\u52d5\u4f5c\u304c\u5177\u4f53\u7684\n- \u300c\u30d8\u30c3\u30c0\u30fc\u306e\u5de6\u306b\u4f1a\u793e\u30ed\u30b4\u3001\u53f3\u306b\u30ca\u30d3\u30b2\u30fc\u30b7\u30e7\u30f3\u30fb\u30e1\u30cb\u30e5\u30fc\uff08\u9867\u5ba2\u4e00\u89a7\u30fb\u8a2d\u5b9a\uff09\u3092\u8ffd\u52a0\u3057\u3066\u3002\u300d \u2192 \u914d\u7f6e\u3068\u5185\u5bb9\u304c\u660e\u78ba\n\n#### \u907f\u3051\u305f\u65b9\u304c\u3044\u3044\u983c\u307f\u65b9\n\n- \u300c\u3044\u3044\u611f\u3058\u306e\u753b\u9762\u3092\u4f5c\u3063\u3066\u300d \u2192 \u300c\u3044\u3044\u611f\u3058\u300d\u306fBob\u306b\u306f\u308f\u304b\u3089\u306a\u3044\n- \u300c\u30c7\u30fc\u30bf\u30d9\u30fc\u30b9\u3068\u9023\u643a\u3057\u3066\u300d \u2192 \u30e2\u30c3\u30af\u30a2\u30c3\u30d7\u306e\u7bc4\u56f2\u3092\u8d85\u3048\u3066\u3044\u308b\n- \u300c\u5b8c\u74a7\u306a\u30b7\u30b9\u30c6\u30e0\u3092\u4f5c\u3063\u3066\u300d \u2192 \u7bc4\u56f2\u304c\u5e83\u3059\u304e\u3066\u3001\u4f55\u304b\u3089\u624b\u3092\u3064\u3051\u308b\u304bBob\u304c\u5224\u65ad\u3057\u306b\u304f\u3044\n\n### \u6bb5\u968e\u7684\u306b\u4f5c\u308b\u306e\u304c\u30b3\u30c4\n\n1. **\u307e\u305a1\u753b\u9762**: \u30b7\u30f3\u30d7\u30eb\u306a\u753b\u9762\u30921\u3064\u4f5c\u308b\n2. **\u6a5f\u80fd\u3092\u8db3\u3059**: \u52d5\u304f\u3082\u306e\u3092\u30d9\u30fc\u30b9\u306b\u3001\u3072\u3068\u3064\u305a\u3064\u6a5f\u80fd\u3092\u8ffd\u52a0\u3059\u308b\n3. **\u898b\u305f\u76ee\u3092\u6574\u3048\u308b**: \u52d5\u4f5c\u3092\u78ba\u304b\u3081\u306a\u304c\u3089\u3001\u30c7\u30b6\u30a4\u30f3\u3092\u8abf\u6574\u3059\u308b\n4. **\u64cd\u4f5c\u3092\u8ffd\u52a0**: \u30af\u30ea\u30c3\u30af\u3084\u30d5\u30a3\u30eb\u30bf\u30fc\u306a\u3069\u306e\u30a4\u30f3\u30bf\u30e9\u30af\u30b7\u30e7\u30f3\u3092\u5165\u308c\u308b\n\n### \u56f0\u3063\u305f\u3068\u304d\u306f\n\n| \u56f0\u308a\u3054\u3068 | \u3084\u3063\u3066\u307f\u308b\u3053\u3068 |\n|---|---|\n| \u601d\u3063\u305f\u901a\u308a\u306b\u52d5\u304b\u306a\u3044 | \u4f55\u304c\u9055\u3046\u304b\u3092\u5177\u4f53\u7684\u306b\u4f1d\u3048\u308b\u3002\u4f8b: \u300c\u691c\u7d22\u30dc\u30c3\u30af\u30b9\u306b\u6587\u5b57\u3092\u5165\u308c\u3066\u3082\u30ea\u30b9\u30c8\u304c\u5909\u308f\u3089\u306a\u3044\u3002\u5165\u529b\u3057\u305f\u6587\u5b57\u3067\u9867\u5ba2\u540d\u3092\u7d5e\u308a\u8fbc\u3081\u308b\u3088\u3046\u306b\u3057\u3066\u3002\u300d |\n| \u30c7\u30b6\u30a4\u30f3\u304c\u597d\u307f\u3068\u9055\u3046 | \u5177\u4f53\u7684\u306b\u3069\u3046\u5909\u3048\u305f\u3044\u304b\u4f1d\u3048\u308b\u3002\u4f8b: \u300c\u30dc\u30bf\u30f3\u3092\u3082\u3063\u3068\u5927\u304d\u304f\u3057\u3066\u3001\u8272\u3092\u9752(#1A73E8)\u306b\u3057\u3066\u3002\u300d |\n| \u6a5f\u80fd\u3092\u8ffd\u52a0\u3057\u305f\u3044 | \u4e00\u5ea6\u306b\u305f\u304f\u3055\u3093\u983c\u307e\u305a\u3001\u3072\u3068\u3064\u305a\u306
